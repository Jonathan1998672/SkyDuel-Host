<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SKY DUEL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-settings.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Keania+One&display=swap" rel="stylesheet">


</head>

<body>

    <!--FONDO ANIMADO-->
    <div class="background">
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
        <span><img src="assets-imagenes/drone.svg"></span>
    </div>

    <div id="authMenu" class="screen active">
        <h1 class="logo">SKY DUEL</h1>
        <div class="auth-container">
            <h2>LOGIN</h2>
            <input type="text" id="loginUser" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button onclick="handleLogin()">ENTRAR</button>
            <p>¿No tienes cuenta? <span class="link" onclick="showScreen('registerMenu')">Regístrate aquí</span></p>
        </div>
    </div>

    <div id="registerMenu" class="screen">
        <h1 class="logo">SKY DUEL</h1>
        <div class="auth-container register-box horizontal-layout">
            <h2>CREAR CUENTA</h2>

            <div class="register-content">

                <div class="avatar-col">
                    <div class="avatar-upload large-avatar">
                        <div class="avatar-preview">
                            <img src="assets-pilotos/default.png" id="registerAvatarPreview" alt="Avatar">
                            <div class="avatar-edit-overlay" onclick="document.getElementById('avatarInput').click()">
                                <span>EDITAR<br>FOTO</span>
                            </div>
                        </div>
                        <input type="file" id="avatarInput" hidden accept="image/*" onchange="previewImage(event)">
                    </div>
                </div>

                <div class="form-col">
                    <input type="text" id="regUser" placeholder="Nombre de Usuario">
                    <input type="email" id="regEmail" placeholder="Correo Electrónico">
                    <input type="password" id="regPass" placeholder="Contraseña">
                    <input type="password" id="regPassConfirm" placeholder="Confirmar Contraseña">

                    <div class="action-buttons">
                        <button onclick="handleRegister()">REGISTRARSE</button>
                        <button class="btn-small" onclick="resetRegisterForm(); showScreen('authMenu')">VOLVER</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainMenu" class="screen">
        <h1 class="logo">SKY DUEL</h1>
        <button onclick="showScreen('connectionMenu')">JUGAR</button>
        <button onclick="settingsOrigin = 'mainMenu'; showScreen('settingsMenu')">CONFIGURACIÓN</button>
        <button onclick="showScreen('scoreMenu')">PUNTUACIONES</button>
    </div>

    <div id="userDisplay" class="user-tag hidden">
        <div class="user-info-container">
            <div class="user-photo-mini">
                <img id="currentUserPhoto" src="assets-pilotos/default.png" alt="Piloto">
            </div>
            <div class="user-text">
                <small>PILOTO</small>
                <span id="currentUserName"></span>
            </div>
        </div>
    </div>

    <!--SELECCION DE MODO-->
    <div id="connectionMenu" class="screen">
        <h2>TIPO DE CONEXIÓN</h2>
        <button onclick="alert('Sección Local en rediseño.')">LOCAL</button>
        <button onclick="alert('Servidores no disponibles por el momento.')">MULTIJUGADOR</button>
        <button onclick="showScreen('mainMenu')">VOLVER</button>
    </div>

    <!--CONFIGURACION-->
    <div id="settingsMenu" class="screen">
        <div class="settings-container">
            <h2>CONFIGURACIÓN</h2>

            <div class="settings-layout">
                <div class="settings-tabs">
                    <button class="tab-btn active" onclick="showSettingsSection('accountSection')">CUENTA</button>
                    <button class="tab-btn" onclick="showSettingsSection('audioSection')">AUDIO</button>
                </div>

                <div class="settings-content">
                    <div id="accountSection" class="settings-panel active">
                        <div class="pilot-card">
                            <div class="card-header">
                                <div class="pilot-photo">
                                    <img id="cardPhoto" src="assets-pilotos/default.png" alt="Foto Piloto">
                                </div>
                                <div class="pilot-main-info">
                                    <h3 id="cardUser">NOMBRE_USUARIO</h3>
                                    <p id="cardEmail">piloto@skyduel.com</p>
                                    <span class="badge">ESTADO: ACTIVO</span>
                                </div>
                            </div>

                            <div class="card-stats">
                                <div class="stat-item">
                                    <label>RANGO CARRERA</label>
                                    <span id="cardRankRace" class="rank-text">RECLUTA</span>
                                </div>
                                <div class="stat-item">
                                    <label>RANGO COMBATE</label>
                                    <span id="cardRankCombat" class="rank-text">RECLUTA</span>
                                </div>
                                <div class="stat-item">
                                    <label>ALTA EN SISTEMA</label>
                                    <span id="cardDate">01/01/2026</span>
                                </div>
                            </div>

                            <button class="btn-danger logout-card-btn" onclick="logout()">CERRAR SESIÓN</button>
                        </div>
                    </div>

                    <div id="audioSection" class="settings-panel">
                        <h3>AJUSTES DE SONIDO</h3>
                        <div class="control-group">
                            <label>MÚSICA</label>
                            <input type="range" id="musicVol" min="0" max="1" step="0.1" value="0.4"
                                onchange="updateVolume()">
                        </div>
                        <div class="control-group">
                            <label>EFECTOS (SFX)</label>
                            <input type="range" id="sfxVol" min="0" max="1" step="0.1" value="0.8">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-back" onclick="backFromSettings()">VOLVER</button>
        </div>
    </div>

    <!--SCOREBOARD-->
    <div id="scoreMenu" class="screen">
        <h2>TOP PILOTOS</h2>

        <div class="score-filters">
            <button class="filter-btn active" onclick="loadScores('CARRERA')">CARRERA</button>
            <button class="filter-btn" onclick="loadScores('COMBATE')">COMBATE</button>
        </div>

        <div class="score-container">
            <table id="highScoresTable">
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>PILOTO</th>
                        <th>PUNTOS</th>
                    </tr>
                </thead>
                <tbody id="scoreBoard">
                </tbody>
            </table>
        </div>
        <button onclick="showScreen('mainMenu')">VOLVER</button>
    </div>

    <audio id="bgMusic" loop></audio>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/settings.js"></script>
    <script type="module" src="js/main.js"></script>

</body>

</html>
